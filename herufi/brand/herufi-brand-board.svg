<svg width="1600" height="2320" viewBox="0 0 1600 2320" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <!-- ============ BOARD BACKGROUND ============ -->
  <rect width="1600" height="2320" fill="#FAFAF8"/>

  <!-- ============ HEADER ============ -->
  <g id="header">
    <rect x="0" y="0" width="1600" height="200" fill="#1C1C1E"/>
    <!-- H mark -->
    <g transform="translate(80,72)">
      <rect x="0" y="0" width="9" height="56" rx="2.5" fill="#FAFAF8"/>
      <rect x="27" y="0" width="9" height="56" rx="2.5" fill="#FAFAF8"/>
      <rect x="0" y="23" width="36" height="10" rx="2.5" fill="#FAFAF8"/>
      <circle cx="49" cy="52" r="5" fill="#C9A84C"/>
    </g>
    <text x="160" y="112" font-size="30" font-weight="700" letter-spacing="6" fill="#FAFAF8">HERUFI</text>
    <text x="1520" y="96" text-anchor="end" font-size="13" font-weight="600" letter-spacing="4" fill="#C9A84C">BRAND GUIDELINES</text>
    <text x="1520" y="122" text-anchor="end" font-size="13" fill="#FAFAF8" opacity="0.45">Research Intelligence Platform — herufi.org</text>
  </g>

  <!-- ============ 01 LOGO ============ -->
  <g id="section-logo">
    <text x="80" y="300" font-size="13" font-weight="700" letter-spacing="4" fill="#C9A84C">01</text>
    <text x="120" y="300" font-size="13" font-weight="700" letter-spacing="4" fill="#1C1C1E">LOGO</text>
    <line x1="80" y1="322" x2="1520" y2="322" stroke="#E5E5E3" stroke-width="1"/>

    <!-- Primary lockup on light -->
    <rect x="80" y="360" width="440" height="240" rx="12" fill="#FFFFFF" stroke="#E5E5E3"/>
    <g transform="translate(180,440)">
      <rect x="0" y="0" width="10" height="64" rx="3" fill="#1B4332"/>
      <rect x="31" y="0" width="10" height="64" rx="3" fill="#1B4332"/>
      <rect x="0" y="27" width="41" height="11" rx="3" fill="#1B4332"/>
      <circle cx="56" cy="60" r="5.5" fill="#C9A84C"/>
      <text x="76" y="45" font-size="26" font-weight="700" letter-spacing="5" fill="#1C1C1E">HERUFI</text>
    </g>
    <text x="100" y="576" font-size="12" fill="#1C1C1E" opacity="0.45">Primary lockup — on Cream / White</text>

    <!-- Light lockup on dark -->
    <rect x="560" y="360" width="440" height="240" rx="12" fill="#1C1C1E"/>
    <g transform="translate(660,440)">
      <rect x="0" y="0" width="10" height="64" rx="3" fill="#FAFAF8"/>
      <rect x="31" y="0" width="10" height="64" rx="3" fill="#FAFAF8"/>
      <rect x="0" y="27" width="41" height="11" rx="3" fill="#FAFAF8"/>
      <circle cx="56" cy="60" r="5.5" fill="#C9A84C"/>
      <text x="76" y="45" font-size="26" font-weight="700" letter-spacing="5" fill="#FAFAF8">HERUFI</text>
    </g>
    <text x="580" y="576" font-size="12" fill="#FAFAF8" opacity="0.45">Light lockup — on Charcoal / Forest</text>

    <!-- Logomark + favicon -->
    <rect x="1040" y="360" width="220" height="240" rx="12" fill="#FFFFFF" stroke="#E5E5E3"/>
    <g transform="translate(1116,436)">
      <rect x="0" y="0" width="12" height="76" rx="3.5" fill="#1B4332"/>
      <rect x="37" y="0" width="12" height="76" rx="3.5" fill="#1B4332"/>
      <rect x="0" y="32" width="49" height="13" rx="3.5" fill="#1B4332"/>
      <circle cx="66" cy="71" r="6.5" fill="#C9A84C"/>
    </g>
    <text x="1060" y="576" font-size="12" fill="#1C1C1E" opacity="0.45">Logomark</text>

    <rect x="1300" y="360" width="220" height="240" rx="12" fill="#F5F5F3" stroke="#E5E5E3"/>
    <g transform="translate(1370,440)">
      <rect x="0" y="0" width="80" height="80" rx="18" fill="#FAFAF8" stroke="#E5E5E3"/>
      <rect x="15" y="12" width="12.5" height="55" rx="4" fill="#1B4332"/>
      <rect x="45" y="12" width="12.5" height="55" rx="4" fill="#1B4332"/>
      <rect x="15" y="33.5" width="42.5" height="12.5" rx="4" fill="#1B4332"/>
      <circle cx="66" cy="66" r="6" fill="#C9A84C"/>
    </g>
    <text x="1320" y="576" font-size="12" fill="#1C1C1E" opacity="0.45">App icon / favicon</text>
  </g>

  <!-- ============ 02 COLOUR ============ -->
  <g id="section-colour">
    <text x="80" y="700" font-size="13" font-weight="700" letter-spacing="4" fill="#C9A84C">02</text>
    <text x="120" y="700" font-size="13" font-weight="700" letter-spacing="4" fill="#1C1C1E">COLOUR</text>
    <line x1="80" y1="722" x2="1520" y2="722" stroke="#E5E5E3" stroke-width="1"/>

    <!-- Row 1: core brand colours -->
    <!-- Forest -->
    <rect x="80" y="760" width="336" height="200" rx="12" fill="#1B4332"/>
    <text x="104" y="806" font-size="16" font-weight="600" fill="#FAFAF8">Forest</text>
    <text x="104" y="930" font-size="13" fill="#FAFAF8" opacity="0.7">#1B4332</text>
    <text x="392" y="930" text-anchor="end" font-size="11" fill="#FAFAF8" opacity="0.5">Brand primary</text>

    <!-- Charcoal -->
    <rect x="448" y="760" width="336" height="200" rx="12" fill="#1C1C1E"/>
    <text x="472" y="806" font-size="16" font-weight="600" fill="#FAFAF8">Charcoal</text>
    <text x="472" y="930" font-size="13" fill="#FAFAF8" opacity="0.7">#1C1C1E</text>
    <text x="760" y="930" text-anchor="end" font-size="11" fill="#FAFAF8" opacity="0.5">Text / dark surfaces</text>

    <!-- Gold -->
    <rect x="816" y="760" width="336" height="200" rx="12" fill="#C9A84C"/>
    <text x="840" y="806" font-size="16" font-weight="600" fill="#1C1C1E">Gold</text>
    <text x="840" y="930" font-size="13" fill="#1C1C1E" opacity="0.75">#C9A84C</text>
    <text x="1128" y="930" text-anchor="end" font-size="11" fill="#1C1C1E" opacity="0.55">Accent</text>

    <!-- Cream -->
    <rect x="1184" y="760" width="336" height="200" rx="12" fill="#FAFAF8" stroke="#E5E5E3"/>
    <text x="1208" y="806" font-size="16" font-weight="600" fill="#1C1C1E">Cream</text>
    <text x="1208" y="930" font-size="13" fill="#1C1C1E" opacity="0.6">#FAFAF8</text>
    <text x="1496" y="930" text-anchor="end" font-size="11" fill="#1C1C1E" opacity="0.45">Background</text>

    <!-- Row 2: supporting colours -->
    <!-- Forest Light -->
    <rect x="80" y="984" width="336" height="120" rx="12" fill="#2D6A4F"/>
    <text x="104" y="1024" font-size="14" font-weight="600" fill="#FAFAF8">Forest Light</text>
    <text x="104" y="1076" font-size="12" fill="#FAFAF8" opacity="0.7">#2D6A4F — hover states</text>

    <!-- Gold Light -->
    <rect x="448" y="984" width="336" height="120" rx="12" fill="#E8C96A"/>
    <text x="472" y="1024" font-size="14" font-weight="600" fill="#1C1C1E">Gold Light</text>
    <text x="472" y="1076" font-size="12" fill="#1C1C1E" opacity="0.6">#E8C96A — accent hover</text>

    <!-- Gray Soft -->
    <rect x="816" y="984" width="336" height="120" rx="12" fill="#F5F5F3" stroke="#E5E5E3"/>
    <text x="840" y="1024" font-size="14" font-weight="600" fill="#1C1C1E">Gray Soft</text>
    <text x="840" y="1076" font-size="12" fill="#1C1C1E" opacity="0.55">#F5F5F3 — cards / tint</text>

    <!-- Border Soft -->
    <rect x="1184" y="984" width="336" height="120" rx="12" fill="#FFFFFF" stroke="#E5E5E3" stroke-width="2"/>
    <text x="1208" y="1024" font-size="14" font-weight="600" fill="#1C1C1E">Border Soft</text>
    <text x="1208" y="1076" font-size="12" fill="#1C1C1E" opacity="0.55">#E5E5E3 — hairlines</text>

    <!-- Proportion bar -->
    <text x="80" y="1170" font-size="12" fill="#1C1C1E" opacity="0.45">Colour proportion — editorial restraint: neutral canvas, forest for identity, gold used sparingly</text>
    <rect x="80" y="1190" width="864" height="44" fill="#FAFAF8" stroke="#E5E5E3"/>
    <rect x="944" y="1190" width="288" height="44" fill="#1C1C1E"/>
    <rect x="1232" y="1190" width="216" height="44" fill="#1B4332"/>
    <rect x="1448" y="1190" width="72" height="44" fill="#C9A84C"/>
    <text x="88" y="1262" font-size="11" fill="#1C1C1E" opacity="0.4">60% Cream</text>
    <text x="952" y="1262" font-size="11" fill="#1C1C1E" opacity="0.4">20% Charcoal</text>
    <text x="1240" y="1262" font-size="11" fill="#1C1C1E" opacity="0.4">15% Forest</text>
    <text x="1456" y="1262" font-size="11" fill="#1C1C1E" opacity="0.4">5% Gold</text>
  </g>

  <!-- ============ 03 TYPOGRAPHY ============ -->
  <g id="section-type">
    <text x="80" y="1380" font-size="13" font-weight="700" letter-spacing="4" fill="#C9A84C">03</text>
    <text x="120" y="1380" font-size="13" font-weight="700" letter-spacing="4" fill="#1C1C1E">TYPOGRAPHY</text>
    <line x1="80" y1="1402" x2="1520" y2="1402" stroke="#E5E5E3" stroke-width="1"/>

    <!-- Inter -->
    <rect x="80" y="1440" width="700" height="360" rx="12" fill="#FFFFFF" stroke="#E5E5E3"/>
    <text x="112" y="1488" font-size="12" font-weight="600" letter-spacing="3" fill="#1B4332">INTER — HEADINGS &amp; UI</text>
    <text x="112" y="1568" font-size="52" font-weight="600" fill="#1C1C1E">Structured intelligence</text>
    <text x="112" y="1620" font-size="24" font-weight="500" fill="#1C1C1E" opacity="0.75">for decision-makers across African markets</text>
    <text x="112" y="1682" font-size="15" fill="#1C1C1E" opacity="0.55">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 0123456789</text>
    <text x="112" y="1748" font-size="12" fill="#1C1C1E" opacity="0.45">Weights: 400 body · 500 nav · 600 headings · 700 wordmark — tracking +0.12em on uppercase labels</text>

    <!-- Merriweather -->
    <rect x="820" y="1440" width="700" height="360" rx="12" fill="#FFFFFF" stroke="#E5E5E3"/>
    <text x="852" y="1488" font-size="12" font-weight="600" letter-spacing="3" fill="#1B4332">MERRIWEATHER — EDITORIAL</text>
    <text x="852" y="1572" font-family="Merriweather, Georgia, serif" font-size="40" font-weight="700" fill="#1C1C1E">Depth over speed.</text>
    <text x="852" y="1632" font-family="Merriweather, Georgia, serif" font-size="19" font-style="italic" fill="#1C1C1E" opacity="0.7">Evidence over opinion. African context first.</text>
    <text x="852" y="1690" font-family="Merriweather, Georgia, serif" font-size="14" fill="#1C1C1E" opacity="0.55">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz</text>
    <text x="852" y="1748" font-size="12" fill="#1C1C1E" opacity="0.45">Used for long-form article body text and pull quotes on research pages</text>
  </g>

  <!-- ============ 04 UI ELEMENTS ============ -->
  <g id="section-ui">
    <text x="80" y="1920" font-size="13" font-weight="700" letter-spacing="4" fill="#C9A84C">04</text>
    <text x="120" y="1920" font-size="13" font-weight="700" letter-spacing="4" fill="#1C1C1E">UI ELEMENTS</text>
    <line x1="80" y1="1942" x2="1520" y2="1942" stroke="#E5E5E3" stroke-width="1"/>

    <!-- Buttons -->
    <rect x="80" y="1990" width="220" height="52" rx="6" fill="#1C1C1E"/>
    <text x="190" y="2022" text-anchor="middle" font-size="14" font-weight="600" fill="#FAFAF8">Work With Herufi</text>

    <rect x="324" y="1990" width="200" height="52" rx="6" fill="#1B4332"/>
    <text x="424" y="2022" text-anchor="middle" font-size="14" font-weight="600" fill="#FAFAF8">Primary action</text>

    <rect x="548" y="1990" width="200" height="52" rx="6" fill="#FAFAF8" stroke="#1C1C1E" stroke-opacity="0.2"/>
    <text x="648" y="2022" text-anchor="middle" font-size="14" font-weight="500" fill="#1C1C1E">Secondary</text>

    <rect x="772" y="1990" width="200" height="52" rx="6" fill="#FAFAF8"/>
    <text x="856" y="2022" text-anchor="middle" font-size="14" font-weight="600" fill="#1B4332">Text link →</text>

    <!-- Pills -->
    <rect x="80" y="2078" width="150" height="36" rx="18" fill="#1B4332"/>
    <text x="155" y="2101" text-anchor="middle" font-size="12" font-weight="500" fill="#FAFAF8">Active filter</text>

    <rect x="246" y="2078" width="150" height="36" rx="18" fill="#FFFFFF" stroke="#E5E5E3"/>
    <text x="321" y="2101" text-anchor="middle" font-size="12" font-weight="500" fill="#1C1C1E" opacity="0.55">Inactive filter</text>

    <rect x="412" y="2078" width="130" height="36" rx="18" fill="#F5F5F3"/>
    <text x="477" y="2101" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="2" fill="#1B4332">PILLAR 01</text>

    <!-- Eyebrow label + card sample -->
    <rect x="1060" y="1988" width="460" height="34" rx="6" fill="#1C1C1E"/>
    <text x="1076" y="2010" font-size="12" font-weight="600" letter-spacing="4" fill="#C9A84C">EYEBROW LABEL — GOLD ON DARK</text>
    <text x="1076" y="2048" font-size="12" font-weight="600" letter-spacing="4" fill="#1B4332">EYEBROW LABEL — FOREST ON LIGHT</text>
    <rect x="1060" y="2062" width="460" height="60" rx="8" fill="#FFFFFF" stroke="#E5E5E3"/>
    <text x="1084" y="2098" font-size="13" font-weight="600" fill="#1C1C1E">Card surface — white, 1px Border Soft, 8–12px radius</text>
  </g>

  <!-- ============ FOOTER ============ -->
  <rect x="0" y="2220" width="1600" height="100" fill="#1B4332"/>
  <text x="80" y="2278" font-size="12" fill="#FAFAF8" opacity="0.6">Herufi Brand Guidelines · v1.0 · Fonts: Inter + Merriweather (Google Fonts)</text>
  <text x="1520" y="2278" text-anchor="end" font-size="12" fill="#C9A84C">herufi.org</text>
</svg>
